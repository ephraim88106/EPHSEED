<!DOCTYPE html>

<body class="noise-bg">
    <e-header></e-header>
    <main class="container" style="padding: 10rem 1.5rem 5rem;">

            <h3 style="margin-top: 2rem;">제 1 조 (목적)</h3>
            <p>이 약관은 에브라임 시드에서 제공하는 지능형 관제 서비스 및 관련 제반 서비스의 이용과 관련하여 회사와 이용자 간의 권리, 의무 및 책임사항을 규정함을 목적으로 합니다.</p>
