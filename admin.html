<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 대시보드 - 에브라임 시드</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            max-width: 1000px;
            margin: 4rem auto;
            background: white;
            padding: 2rem;
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 2rem;
        }
        th, td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        th {
            background: var(--bg-alt);
            color: var(--primary-dark);
            font-weight: 700;
        }
        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 700;
            background: #e0e0e0;
        }
    </style>
</head>
<body class="noise-bg">
    <div class="admin-container">
        <h1 style="color: var(--primary-dark);">상담 신청 내역</h1>
        <p>실시간으로 접수된 고객님들의 상담 신청 리스트입니다.</p>
        
        <table id="inquiryTable">
            <thead>
                <tr>
                    <th>날짜</th>
                    <th>성함/상호명</th>
                    <th>연락처</th>
                    <th>매장 종류</th>
                    <th>문의 사항</th>
                </tr>
            </thead>
            <tbody id="inquiryList">
                <!-- Data will be loaded here -->
                <tr>
                    <td colspan="5" style="text-align: center; padding: 3rem;">데이터를 불러오는 중입니다...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
